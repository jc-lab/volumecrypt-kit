name: CI

on:
  push: {}
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: gusztavvargadr-windows-11-2601.0.0.qcow2
  IMAGE_CACHE_KEY: vagrant-gusztavvargadr-windows-11-2601.0.0
  TEST_USE_VM: ${{ vars.TEST_USE_VM || '0' }}

jobs:
  # ── Download and cache the Windows 11 VM base image ────────────────────────
  # ubuntu-latest: vagrant + libvirt box extraction is straightforward on Linux.
  # The extracted qcow2 is saved to GitHub Actions cache so Windows runner jobs
  # can restore it without re-downloading from Vagrant Cloud.
  prepare-image:
    name: Prepare VM image
    if: ${{ (vars.TEST_USE_VM || '0') == '1' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore cached qcow2
        id: image-cache
        uses: actions/cache@v5
        with:
          path: testing/images/${{ env.IMAGE_NAME }}
          key: ${{ env.IMAGE_CACHE_KEY }}

      - name: Install vagrant + qemu-utils
        if: steps.image-cache.outputs.cache-hit != 'true'
        run: |
          wget -qO- https://apt.releases.hashicorp.com/gpg \
            | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] \
            https://apt.releases.hashicorp.com $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/hashicorp.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y vagrant qemu-utils

      - name: Download and extract qcow2
        if: steps.image-cache.outputs.cache-hit != 'true'
        run: |
          chmod +x .ci/scripts/vagrant-extract-qcow2.sh
          .ci/scripts/vagrant-extract-qcow2.sh \
            gusztavvargadr/windows-11 \
            2601.0.0 \
            ./testing/images/

  # ── Unit tests + build artifacts (sequential within one job) ─────────────────
  build-and-test:
    name: Build & Test
    runs-on: windows-2025-vs2026
    steps:
      - uses: actions/checkout@v4
        with:
          # Preserve testing/images/ (qcow2) and .testfoundry/ between runs.
          clean: false

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          location: 'C:\msys64'
          update: false
          path-type: inherit   # makes Windows PATH (cargo, go, etc.) visible inside msys2

      - name: install WDK
        run: winget install --id Microsoft.WindowsWDK.10.0.26100 --exact  --accept-package-agreements  --accept-source-agreements --disable-interactivity

      - name: install x86_64-unknown-uefi
        run: rustup target add x86_64-unknown-uefi

      - name: fmt (host)
        run: cargo fmt --check
        
      - name: clippy (vck-common, host)
        run: cargo clippy -p vck-common -- -D warnings

      - name: clippy (vck-windrv)
        shell: msys2 {0}
        run: |
          make clippy-driver

      - name: clippy (vck-loader, UEFI target)
        run: cargo clippy -p vck-loader -p vck-sample-loader --target x86_64-unknown-uefi -- -D warnings

      - name: cargo test (host)
        shell: msys2 {0}
        run: cargo test -p vck-common

      - name: Build driver, loader, and app
        shell: msys2 {0}
        run: make build-driver build-loader build-app

      - uses: actions/upload-artifact@v7
        with:
          name: vck-artifacts-${{ github.run_id }}
          # vck-sample-driver.sys, vck-windrv-pkg/, vck-sample-loader.efi, vck-app.exe
          path: testing/artifacts/

  # ── VM tests (parallel matrix) ─────────────────────────────────────────────
  vm-test:
    name: VM / ${{ matrix.suite }}
    if: ${{ (vars.TEST_USE_VM || '0') == '1' }}
    needs: [build-and-test, prepare-image]
    runs-on: windows-2025-vs2026
    strategy:
      fail-fast: false
      matrix:
        suite: [driver-load, os-volume-prepare, data-volume]

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          location: 'C:\msys64'
          update: false
          path-type: inherit

      - uses: actions/download-artifact@v8
        with:
          name: vck-artifacts-${{ github.run_id }}
          path: testing/artifacts/

      # Restore the qcow2 image that prepare-image downloaded and cached.
      # fail-on-cache-miss: true ensures the job fails clearly if prepare-image
      # did not produce the cache (rather than silently running without an image).
      - name: Restore VM image cache
        uses: actions/cache/restore@v4
        with:
          path: testing/images/${{ env.IMAGE_NAME }}
          key: ${{ env.IMAGE_CACHE_KEY }}
          fail-on-cache-miss: true

      - name: Download test-foundry
        shell: pwsh
        run: |
          $dest = "$env:RUNNER_TEMP\test-foundry.exe"
          Invoke-WebRequest `
            -Uri "https://github.com/jc-lab/test-foundry/releases/download/v0.0.14/test-foundry_windows_amd64.exe" `
            -OutFile $dest
          # Add RUNNER_TEMP to PATH so test-foundry.exe is available in all subsequent steps.
          "$env:RUNNER_TEMP" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      # vm-setup only runs on first use of a fresh runner workspace.
      # With clean: false the .testfoundry/win11 directory persists across runs
      # on the same runner instance, so this is effectively a one-time cost.
      - name: Ensure VM is set up
        shell: msys2 {0}
        run: |
          echo "Running vm-setup (first use on this runner)..."
          test-foundry.exe --vm-name=win11 vm-setup \
            --image ./testing/images/windows-11.yaml

      - name: Run VM test — ${{ matrix.suite }}
        shell: msys2 {0}
        run: |
          rm -rf ./testing/results/${{ matrix.suite }}
          test-foundry.exe --vm-name=win11 test --headless \
            --output ./testing/results/${{ matrix.suite }} \
            --test ./testing/recipes/${{ matrix.suite }}/${{ matrix.suite }}.yaml

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.suite }}-${{ github.run_id }}
          path: testing/results/${{ matrix.suite }}/
          if-no-files-found: warn

  # ── Publish to crates.io on version tag ────────────────────────────────────
  publish:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-and-test
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC token exchange
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="vck-common") | .version')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Version mismatch: tag=${TAG_VERSION}, Cargo.toml=${CARGO_VERSION}"
            exit 1
          fi
          echo "Version verified: ${CARGO_VERSION}"

      - id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish vck-common
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p vck-common

      - name: Publish vck-windrv
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p vck-windrv --no-verify

      - name: Publish vck-loader
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish -p vck-loader --no-verify
