name: "data-volume"
description: >
  Data volume encryption via AddDevice (correct filter position):
  1) Install driver via INF (pnputil) — registers as UpperFilter for Disk Drives.
  2) Reboot → AddDevice fires BEFORE NTFS mounts → filter correctly below FSD.
  3) PREPARE: metadata write + sector-0 encryption via LowerDeviceIo (no PartMgr issue).
  4) Sweep starts from sector 1 via lower device (bypasses NTFS and PartMgr).

qemu:
  extra_args:
    - "-chardev"
    - "file,id=debugout,path=${{ output.dir }}/debug.log"
    - "-device"
    - "isa-debugcon,iobase=0xe9,chardev=debugout"

steps:
  - action: wait-boot
    timeout: 120s
    params:
      retry_interval: 5s

  # Upload driver sys + INF.
  - action: file-upload
    timeout: 30s
    params:
      src: "./testing/artifacts/vck-sample-driver.sys"
      dst: "C:\\Temp\\vck-sample-driver.sys"

  - action: file-upload
    timeout: 30s
    params:
      src: "./testing/artifacts/vck-sample-driver.inf"
      dst: "C:\\Temp\\vck-sample-driver.inf"

  - action: file-upload
    timeout: 30s
    params:
      src: "./testing/artifacts/vck-app.exe"
      dst: "C:\\Temp\\vck-app.exe"

  # Copy driver to system32/drivers (INF installation will also do this but
  # pnputil needs the sys to be accessible).
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "copy /Y C:\\Temp\\vck-sample-driver.sys C:\\Windows\\System32\\drivers\\vck-sample-driver.sys"
      expect_exit_code: 0

  - action: exec
    timeout: 30s
    params:
      cmd: "verifier.exe"
      args:
        - "/volatile"
        - "/adddriver"
        - "vck-sample-driver.sys"

  - action: exec
    timeout: 60s
    params:
      cmd: "powershell"
      args:
        - "-Command"
        - "Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue; Add-MpPreference -ExclusionPath 'C:\\Temp' -ErrorAction SilentlyContinue; Add-MpPreference -ExclusionPath 'D:\\' -ErrorAction SilentlyContinue"

  # Install driver as FILE_SYSTEM_DRIVER (ServiceType=2) with boot start.
  # ServiceType=2 + LoadOrderGroup=FSFilter is required for PnP to call AddDevice.
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "sc create VolumeCryptKitSample type= filesys start= boot binPath= C:\\Windows\\System32\\drivers\\vck-sample-driver.sys group= FSFilter"
      expect_exit_code: 0

  # Register as UpperFilter for Disk Drives class.
  # UpperFilters causes PnP to call AddDevice for each disk volume BEFORE any FSD.
  - action: exec
    timeout: 30s
    params:
      cmd: "powershell"
      args:
        - "-Command"
        - |
          $key = 'HKLM:\SYSTEM\CurrentControlSet\Control\Class\{4d36e967-e325-11ce-bfc1-08002be10318}'
          $ex = (Get-ItemProperty -Path $key -Name UpperFilters -ErrorAction SilentlyContinue).UpperFilters
          if ($ex -notcontains 'VolumeCryptKitSample') {
            Set-ItemProperty -Path $key -Name UpperFilters -Value (@($ex | Where-Object{$_}) + 'VolumeCryptKitSample')
          }
          Write-Host "UpperFilters: $((Get-ItemProperty $key -Name UpperFilters -EA SilentlyContinue).UpperFilters)"
      expect_exit_code: 0

  # Start driver manually for this session (AddDevice not yet active for existing volumes).
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "sc start VolumeCryptKitSample"
      expect_exit_code: 0

  # Write a test file before encryption.
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "echo hello-before-reboot> D:\\vck-pretest.txt"
      expect_exit_code: 0

  # Reboot: on next boot, driver loads as FILE_SYSTEM_DRIVER (SERVICE_BOOT_START),
  # PnP calls AddDevice for each disk volume BEFORE NTFS mounts.
  - action: reboot
    timeout: 120s

  - action: wait-boot
    timeout: 2m0s
    params:
      retry_interval: 5s

  # Check that AddDevice fired (should see add_device: pdo=... in debug.log).
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe status --volume \\\\.\\D:"
      expect_exit_code: 0

  # Volume info (should show full partition size until PREPARE activates size hiding).
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe volume-info --volume \\\\.\\D:"
      expect_exit_code: 0

  # Phase: shrink + PREPARE (uses AddDevice path if filter found, else fallback).
  - action: exec
    timeout: 2m0s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe data-volume attach --volume \\\\.\\D: --vmk AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8= --use-header 0 --use-footer 2 --metadata-size 131072"
      expect_exit_code: 0

  # Volume info after attach: reduced size if filter activated.
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe volume-info --volume \\\\.\\D:"
      expect_exit_code: 0

  # Status: should show filter_below_fsd=true if AddDevice fired.
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe status --volume \\\\.\\D:"
      expect_exit_code: 0

  # Pre-existing file must be readable.
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "type D:\\vck-pretest.txt"
      expect_exit_code: 0

  # Write new file through filter.
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "echo hello-after-attach> D:\\vck-posttest.txt && type D:\\vck-posttest.txt"
      expect_exit_code: 0

  # Detach and stop.
  - action: exec
    timeout: 60s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe data-volume detach --volume \\\\.\\D:"
      expect_exit_code: 0

  - action: exec
    timeout: 60s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "sc stop VolumeCryptKitSample"

  - action: shutdown
    timeout: 2m0s

panic:
  action_delay: 60s
  steps:
    - action: dump
      timeout: 300s
      params:
        format: "win-dmp"
        output: "${{ output.dir}}/memory.dmp"
    - action: poweroff
      timeout: 5s
