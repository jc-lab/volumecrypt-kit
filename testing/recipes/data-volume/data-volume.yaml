name: "data-volume"
description: >
  Data volume full flow with AddDevice:
  1) Install driver as boot-start lower filter, shrink volume, write metadata.
  2) Reboot → AddDevice fires before NTFS, filter below FSD.
  3) Attach (provide VMK) → filter active, sweep can write via lower device.

qemu:
  extra_args:
    - "-chardev"
    - "file,id=debugout,path=${{ output.dir }}/debug.log"
    - "-device"
    - "isa-debugcon,iobase=0xe9,chardev=debugout"

steps:
  - action: wait-boot
    timeout: 120s
    params:
      retry_interval: 5s

  - action: file-upload
    timeout: 30s
    params:
      src: "./testing/artifacts/vck-sample-driver.sys"
      dst: "C:\\Temp\\vck-sample-driver.sys"

  # Also copy to system drivers dir for boot-start installation.
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "copy /Y C:\\Temp\\vck-sample-driver.sys C:\\Windows\\System32\\drivers\\vck-sample-driver.sys"
      expect_exit_code: 0

  - action: file-upload
    timeout: 30s
    params:
      src: "./testing/artifacts/vck-app.exe"
      dst: "C:\\Temp\\vck-app.exe"

  # Install driver from system drivers dir as demand-start initially.
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "sc create VolumeCryptKitSample type= kernel start= demand binPath= C:\\Windows\\System32\\drivers\\vck-sample-driver.sys"
      expect_exit_code: 0

  - action: exec
    timeout: 30s
    params:
      cmd: "verifier.exe"
      args:
        - "/volatile"
        - "/adddriver"
        - "vck-sample-driver.sys"

  # Disable Windows Defender scan on test paths.
  - action: exec
    timeout: 60s
    params:
      cmd: "powershell"
      args:
        - "-Command"
        - "Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue; Add-MpPreference -ExclusionPath 'C:\\Temp' -ErrorAction SilentlyContinue; Add-MpPreference -ExclusionPath 'D:\\' -ErrorAction SilentlyContinue"

  # Start driver (control device only; AddDevice not yet active on existing volumes).
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "sc start VolumeCryptKitSample"
      expect_exit_code: 0

  # Write a test file before encryption.
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "echo hello-before-attach> D:\\vck-pretest.txt"
      expect_exit_code: 0

  # Phase 1: shrink volume tail + write JVCK metadata + encrypt sector 0
  # (PREPARE does lock/dismount to write sector 0; filter is NOT yet below NTFS
  #  at this point, but sector 0 is written while locked).
  - action: exec
    timeout: 2m0s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe data-volume attach --volume \\\\.\\D: --vmk AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8= --use-header 0 --use-footer 2 --metadata-size 131072"
      expect_exit_code: 0

  # Show size before reboot (NTFS sees reduced size via filter).
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe volume-info --volume \\\\.\\D:"
      expect_exit_code: 0

  # Detach filter (will be re-attached via AddDevice after reboot).
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe data-volume detach --volume \\\\.\\D:"
      expect_exit_code: 0

  # Configure driver as boot-start so it loads before any filesystem drivers.
  # boot-start → SERVICE_BOOT_START → PnP calls AddDevice during enumeration.
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "sc config VolumeCryptKitSample start= boot"
      expect_exit_code: 0

  # Register as LowerFilter for disk volume class so PnP calls AddDevice
  # before any FSD mounts. This places our filter BELOW the FSD.
  # Disk Volume class GUID: {4d36e967-e325-11ce-bfc1-08002be10318}
  - action: exec
    timeout: 30s
    params:
      cmd: "powershell"
      args:
        - "-Command"
        - |
          $key = 'HKLM:\SYSTEM\CurrentControlSet\Control\Class\{4d36e967-e325-11ce-bfc1-08002be10318}'
          $existing = (Get-ItemProperty -Path $key -Name LowerFilters -ErrorAction SilentlyContinue).LowerFilters
          if ($existing -notcontains 'VolumeCryptKitSample') {
            $new = @($existing | Where-Object { $_ }) + 'VolumeCryptKitSample'
            Set-ItemProperty -Path $key -Name LowerFilters -Value $new
          }
          Write-Host "LowerFilters: $((Get-ItemProperty -Path $key -Name LowerFilters).LowerFilters)"
      expect_exit_code: 0

  # Stop driver before reboot.
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "sc stop VolumeCryptKitSample"

  - action: reboot
    timeout: 30s

  - action: wait-boot
    timeout: 2m0s
    params:
      retry_interval: 5s

  # After reboot: AddDevice has fired, filter is below NTFS on every volume.
  # D: VBR (sector 0) is ciphertext; NTFS reads through filter → decrypted ✓

  # Verify D: is accessible (NTFS mounted above filter, decryption active for s0).
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "type D:\\vck-pretest.txt"
      expect_exit_code: 0

  # Volume info: should show full partition size (filter not yet activated for D:).
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe volume-info --volume \\\\.\\D:"
      expect_exit_code: 0

  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "sc stop VolumeCryptKitSample"

  - action: shutdown
    timeout: 2m0s

panic:
  action_delay: 60s
  steps:
    - action: dump
      timeout: 300s
      params:
        format: "win-dmp"
        output: "${{ output.dir}}/memory.dmp"
    - action: poweroff
      timeout: 5s
