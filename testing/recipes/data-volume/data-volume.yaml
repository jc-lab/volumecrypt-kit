name: "data-volume"
description: >
  Data volume encryption via AddDevice (correct filter position):
  1) Install driver via INF (pnputil) — registers as UpperFilter for Disk Drives.
  2) Reboot → AddDevice fires BEFORE NTFS mounts → filter correctly below FSD.
  3) PREPARE: metadata write + sector-0 encryption via LowerDeviceIo (no PartMgr issue).
  4) Sweep starts from sector 1 via lower device (bypasses NTFS and PartMgr).

qemu:
  extra_args:
    - "-chardev"
    - "file,id=debugout,path=${{ output.dir }}/debug.log"
    - "-device"
    - "isa-debugcon,iobase=0xe9,chardev=debugout"

steps:
  - id: "wait-initial-boot"
    name: "Wait for initial Windows boot"
    action: wait-boot
    timeout: 120s
    params:
      retry_interval: 5s

  # Upload signed driver package (.sys + .inf + .cat).
  - id: "upload-driver-sys"
    name: "Upload signed driver SYS"
    action: file-upload
    timeout: 30s
    params:
      src: "./testing/artifacts/vck-driver-pkg/vck-sample-driver.sys"
      dst: "C:\\Temp\\vck-sample-driver.sys"

  - id: "upload-driver-inf"
    name: "Upload signed driver INF"
    action: file-upload
    timeout: 30s
    params:
      src: "./testing/artifacts/vck-driver-pkg/vck-sample-driver.inf"
      dst: "C:\\Temp\\vck-sample-driver.inf"

  - id: "upload-driver-cat"
    name: "Upload signed driver CAT"
    action: file-upload
    timeout: 30s
    params:
      src: "./testing/artifacts/vck-driver-pkg/vck-sample-driver.cat"
      dst: "C:\\Temp\\vck-sample-driver.cat"

  - id: "upload-vck-app"
    name: "Upload VCK test application"
    action: file-upload
    timeout: 30s
    params:
      src: "./testing/artifacts/vck-app.exe"
      dst: "C:\\Temp\\vck-app.exe"

  - id: "enable-driver-verifier"
    name: "Enable Driver Verifier for sample driver"
    action: exec
    timeout: 30s
    params:
      cmd: "verifier.exe"
      args:
        - "/volatile"
        - "/adddriver"
        - "vck-sample-driver.sys"

  - id: "configure-defender-exclusions"
    name: "Disable Defender realtime monitoring and add exclusions"
    action: exec
    timeout: 60s
    params:
      cmd: "powershell"
      args:
        - "-Command"
        - "Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue; Add-MpPreference -ExclusionPath 'C:\\Temp' -ErrorAction SilentlyContinue; Add-MpPreference -ExclusionPath 'D:\\' -ErrorAction SilentlyContinue"

  # Install the signed driver package via pnputil. The .cat file has the test
  # certificate signature so pnputil accepts it. The INF registers the driver as
  # ServiceType=FILE_SYSTEM_DRIVER, LoadOrderGroup=FSFilter, UpperFilters for
  # disk drives — causing AddDevice to fire for every disk volume on next boot.
  - id: "install-driver-package"
    name: "Install signed driver package with pnputil"
    action: exec
    timeout: 60s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "pnputil /add-driver C:\\Temp\\vck-sample-driver.inf /install"
      expect_exit_code: 0

  # Start driver for this session (control device / sweep worker).
  # AddDevice will fire automatically on NEXT boot via UpperFilters registration.
  - id: "install-driver-package"
    name: "Install signed driver package with pnputil"
    action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "sc start VolumeCryptKitSample"

  # Write a test file before encryption.
  - id: "write-pre-reboot-test-file"
    name: "Write pre-reboot test file to D volume"
    action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "echo hello-before-reboot> D:\\vck-pretest.txt"
      expect_exit_code: 0

  # Reboot: on next boot, driver loads as FILE_SYSTEM_DRIVER (SERVICE_BOOT_START),
  # PnP calls AddDevice for each disk volume BEFORE NTFS mounts.
  - id: "reboot-for-add-device"
    name: "Reboot to trigger AddDevice before NTFS mount"
    action: reboot
    timeout: 120s

  - id: "wait-post-reboot-boot"
    name: "Wait for Windows boot after driver registration reboot"
    action: wait-boot
    timeout: 2m0s
    params:
      retry_interval: 5s

  # Check that AddDevice fired (should see add_device: pdo=... in debug.log).
  - id: "check-driver-status-after-add-device"
    name: "Check driver status after AddDevice"
    action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe status --volume \\\\.\\D:"
      expect_exit_code: 0

  # Volume info (should show full partition size until PREPARE activates size hiding).
  - id: "check-volume-info-before-attach"
    name: "Check D volume info before attach"
    action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe volume-info --volume \\\\.\\D:"
      expect_exit_code: 0

  # Phase: shrink + PREPARE (uses AddDevice path if filter found, else fallback).
  - id: "attach-data-volume"
    name: "Attach data volume and prepare metadata"
    action: exec
    timeout: 2m0s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe data-volume attach --volume \\\\.\\D: --vmk AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8= --use-header 0 --use-footer 2 --metadata-size 131072"
      expect_exit_code: 0

  # Volume info after attach: reduced size if filter activated.
  - id: "check-volume-info-after-attach"
    name: "Check D volume info after attach"
    action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe volume-info --volume \\\\.\\D:"
      expect_exit_code: 0

  # Status: should show filter_below_fsd=true if AddDevice fired.
  - id: "check-filter-position-status"
    name: "Check filter position status"
    action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe status --volume \\\\.\\D:"
      expect_exit_code: 0

  # Pre-existing file must be readable (filter pass-through, boundary=0).
  - id: "read-pretest-file-after-attach"
    name: "Read pre-existing file after attach"
    action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "type D:\\vck-pretest.txt"
      expect_exit_code: 0

  # Write new file through filter.
  - id: "write-and-read-post-attach-file"
    name: "Write and read post-attach file through filter"
    action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "echo hello-after-attach> D:\\vck-posttest.txt && type D:\\vck-posttest.txt"
      expect_exit_code: 0

  # Start progressive encryption (sweep begins from sector 0 via LowerDeviceIo).
  - id: "start-progressive-encryption"
    name: "Start progressive data volume encryption"
    action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe data-volume encrypt --volume \\\\.\\D:"
      expect_exit_code: 0

  # Wait for the sweep to make measurable progress (> 0 sectors including sector 0).
  # A 10 GiB full encrypt takes too long in CI; we just verify the sweep advances.
  - id: "wait-for-encryption-progress"
    name: "Wait for encryption sweep progress"
    action: exec
    timeout: 60s
    params:
      cmd: "powershell"
      args:
        - "-Command"
        - |
          $deadline = (Get-Date).AddSeconds(45)
          $ok = $false
          do {
            $out = & C:\Temp\vck-app.exe status --volume \\.\D: 2>&1 | Out-String
            Write-Host $out.Trim()
            if ($out -match 'Encrypting|Idle') {
              $m = [regex]::Match($out, 'Progress\s*:\s*([\d.]+)%\s+\((\d+)')
              if ($m.Success -and [int64]$m.Groups[2].Value -gt 0) {
                $ok = $true; break
              }
            }
            Start-Sleep -Seconds 3
          } while ((Get-Date) -lt $deadline)
          if ($ok) { Write-Host "SWEEP_OK" } else { Write-Host "NO_PROGRESS"; exit 1 }
      expect_exit_code: 0

  # Files written BEFORE encryption must still be readable (filter decrypts on read).
  - id: "read-files-written-before-encryption"
    name: "Read files written before encryption"
    action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "type D:\\vck-pretest.txt && type D:\\vck-posttest.txt"
      expect_exit_code: 0

  # Write a new file AFTER encryption starts — filter must encrypt writes, then
  # decrypt on subsequent reads.
  - id: "write-and-read-during-encryption-file"
    name: "Write and read file while encryption is active"
    action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "echo hello-during-encrypt> D:\\vck-during.txt && type D:\\vck-during.txt"
      expect_exit_code: 0

  # Detach and stop.
  - id: "detach-data-volume"
    name: "Detach data volume"
    action: exec
    timeout: 60s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe data-volume detach --volume \\\\.\\D:"
      expect_exit_code: 0

  - id: "stop-driver-service"
    name: "Stop VolumeCryptKit sample driver service"
    action: exec
    timeout: 60s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "sc stop VolumeCryptKitSample"

  - id: "shutdown-vm"
    name: "Shutdown VM"
    action: shutdown
    timeout: 2m0s

panic:
  action_delay: 60s
  steps:
    - action: dump
      timeout: 300s
      params:
        format: "win-dmp"
        output: "${{ output.dir}}/memory.dmp"
    - action: poweroff
      timeout: 5s
