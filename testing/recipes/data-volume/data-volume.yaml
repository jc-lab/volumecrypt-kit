name: "data-volume"
description: "Attach a data volume (shrink tail + write footer metadata + attach filter), verify the volume stays usable through the pass-through filter, then detach."

qemu:
  extra_args:
    - "-chardev"
    - "file,id=debugout,path=${{ output.dir }}/debug.log"
    - "-device"
    - "isa-debugcon,iobase=0xe9,chardev=debugout"

steps:
  - action: wait-boot
    timeout: 120s
    params:
      retry_interval: 5s

  - action: file-upload
    timeout: 30s
    params:
      src: "./testing/artifacts/vck-sample-driver.sys"
      dst: "C:\\Temp\\vck-sample-driver.sys"

  - action: file-upload
    timeout: 30s
    params:
      src: "./testing/artifacts/vck-app.exe"
      dst: "C:\\Temp\\vck-app.exe"

  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "sc create VolumeCryptKitSample type= kernel start= demand binPath= C:\\Temp\\vck-sample-driver.sys"
      expect_exit_code: 0

  - action: exec
    timeout: 30s
    params:
      cmd: "verifier.exe"
      args:
        - "/volatile"
        - "/adddriver"
        - "vck-sample-driver.sys"

  - action: exec
    timeout: 60s
    params:
      cmd: "powershell"
      args:
        - "-Command"
        - "Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue; Add-MpPreference -ExclusionPath 'C:\\Temp' -ErrorAction SilentlyContinue; Add-MpPreference -ExclusionPath 'D:\\' -ErrorAction SilentlyContinue"

  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "sc start VolumeCryptKitSample"
      expect_exit_code: 0

  # Write a file BEFORE attaching, to confirm the filesystem survives shrink +
  # metadata write + filter attach.
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "echo hello-before-attach> D:\\vck-pretest.txt"
      expect_exit_code: 0

  # Raw volume length BEFORE attach (full partition size).
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe volume-info --volume \\\\.\\D:"
      expect_exit_code: 0

  # Attach: app shrinks the volume tail, driver writes footer metadata + attaches
  # the (currently transparent) filter.
  - action: exec
    timeout: 120s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe data-volume attach --volume \\\\.\\D: --vmk AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8= --use-header 0 --use-footer 2 --metadata-size 131072"
      expect_exit_code: 0

  # Raw volume length AFTER attach: must be the data-region size (partition
  # minus 2x 128 KiB footer = 262144 bytes smaller), proving the filter hides the
  # metadata from the OS.
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe volume-info --volume \\\\.\\D:"
      expect_exit_code: 0

  # The pre-existing file must still be readable through the filter.
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "type D:\\vck-pretest.txt"
      expect_exit_code: 0

  # And the volume must still accept new writes through the filter.
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "echo hello-after-attach> D:\\vck-posttest.txt && type D:\\vck-posttest.txt"
      expect_exit_code: 0

  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe status --volume \\\\.\\D:"
      expect_exit_code: 0

  # Start progressive encryption of the data volume and wait for some progress.
  # A 10 GiB full encrypt takes too long; we verify the sweep makes measurable
  # progress (> 0 sectors) within 45 s.
  - action: exec
    timeout: 60s
    params:
      cmd: "powershell"
      args:
        - "-Command"
        - |
          & C:\Temp\vck-app.exe data-volume encrypt --volume \\.\D:
          $deadline = (Get-Date).AddSeconds(45)
          $progress = $false
          do {
            $out = & C:\Temp\vck-app.exe status --volume \\.\D: 2>&1 | Out-String
            Write-Host $out
            if ($out -match 'Encrypting|Idle') {
              $m = [regex]::Match($out, '([\d]+)\s*/\s*\d+\s+sector')
              if ($m.Success -and [int64]$m.Groups[1].Value -gt 0) {
                $progress = $true; break
              }
            }
            Start-Sleep -Seconds 3
          } while ((Get-Date) -lt $deadline)
          if ($progress) { Write-Host "SWEEP_PROGRESS_OK" } else { Write-Host "NO_SWEEP_PROGRESS" }
          exit $(if ($progress) { 0 } else { 1 })
      expect_exit_code: 0

  # Files written before and after attach must still read back correctly
  # through the filter (transparent decryption for encrypted sectors).
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "type D:\\vck-pretest.txt && type D:\\vck-posttest.txt"
      expect_exit_code: 0

  # Detach the filter before stopping the driver.
  - action: exec
    timeout: 60s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe data-volume detach --volume \\\\.\\D:"
      expect_exit_code: 0

  - action: exec
    timeout: 60s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "sc stop VolumeCryptKitSample"
      expect_exit_code: 0

  - action: shutdown
    timeout: 120s

# Collect diagnostics on a bugcheck.
panic:
  action_delay: 60s
  steps:
    - action: dump
      timeout: 300s
      params:
        format: "win-dmp"
        output: "${{ output.dir }}/memory.dmp"
    - action: poweroff
      timeout: 5s
