name: "data-volume"
description: >
  Data volume encryption via AddDevice (correct filter position):
  1) Install driver as boot-start, register LowerFilters, reboot.
  2) After reboot, AddDevice fires BEFORE NTFS mounts → filter correctly below FSD.
  3) PREPARE: metadata write + sector-0 encryption via LowerDeviceIo (no PartMgr issue).
  4) Sweep starts from sector 1 via lower device (bypasses NTFS and PartMgr).

qemu:
  extra_args:
    - "-chardev"
    - "file,id=debugout,path=${{ output.dir }}/debug.log"
    - "-device"
    - "isa-debugcon,iobase=0xe9,chardev=debugout"

steps:
  - action: wait-boot
    timeout: 120s
    params:
      retry_interval: 5s

  # Upload driver to System32/drivers (required for boot-start).
  - action: file-upload
    timeout: 30s
    params:
      src: "./testing/artifacts/vck-sample-driver.sys"
      dst: "C:\\Windows\\System32\\drivers\\vck-sample-driver.sys"

  - action: file-upload
    timeout: 30s
    params:
      src: "./testing/artifacts/vck-app.exe"
      dst: "C:\\Temp\\vck-app.exe"

  # Install as boot-start so PnP calls AddDevice before any FSD mounts.
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "sc create VolumeCryptKitSample type= kernel start= boot binPath= C:\\Windows\\System32\\drivers\\vck-sample-driver.sys"
      expect_exit_code: 0

  - action: exec
    timeout: 30s
    params:
      cmd: "verifier.exe"
      args:
        - "/volatile"
        - "/adddriver"
        - "vck-sample-driver.sys"

  - action: exec
    timeout: 60s
    params:
      cmd: "powershell"
      args:
        - "-Command"
        - "Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue; Add-MpPreference -ExclusionPath 'C:\\Temp' -ErrorAction SilentlyContinue; Add-MpPreference -ExclusionPath 'D:\\' -ErrorAction SilentlyContinue"

  # Register as LowerFilter for the disk drive class (Disk Drives class).
  # GUID {4d36e967-e325-11ce-bfc1-08002be10318} = Disk Drives
  # LowerFilters causes AddDevice to be called for each disk (and its volumes).
  - action: exec
    timeout: 30s
    params:
      cmd: "powershell"
      args:
        - "-Command"
        - |
          # Disk Drives class
          $diskKey = 'HKLM:\SYSTEM\CurrentControlSet\Control\Class\{4d36e967-e325-11ce-bfc1-08002be10318}'
          $ex = (Get-ItemProperty -Path $diskKey -Name LowerFilters -ErrorAction SilentlyContinue).LowerFilters
          if ($ex -notcontains 'VolumeCryptKitSample') {
            Set-ItemProperty -Path $diskKey -Name LowerFilters -Value (@($ex | Where-Object{$_}) + 'VolumeCryptKitSample')
          }
          Write-Host "Disk LowerFilters: $((Get-ItemProperty -Path $diskKey -Name LowerFilters -EA SilentlyContinue).LowerFilters)"
          # Volume class
          $volKey = 'HKLM:\SYSTEM\CurrentControlSet\Control\Class\{71a27cdd-812a-11d0-bec7-08002be2092f}'
          if (Test-Path $volKey) {
            $ex2 = (Get-ItemProperty -Path $volKey -Name LowerFilters -ErrorAction SilentlyContinue).LowerFilters
            if ($ex2 -notcontains 'VolumeCryptKitSample') {
              Set-ItemProperty -Path $volKey -Name LowerFilters -Value (@($ex2 | Where-Object{$_}) + 'VolumeCryptKitSample')
            }
            Write-Host "Volume LowerFilters: $((Get-ItemProperty -Path $volKey -Name LowerFilters -EA SilentlyContinue).LowerFilters)"
          }
      expect_exit_code: 0

  # Write a test file before encryption.
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "echo hello-before-reboot> D:\\vck-pretest.txt"
      expect_exit_code: 0

  # First reboot: activates boot-start driver + applies LowerFilters registration.
  # After this boot AddDevice fires for the first time.
  - action: reboot
    timeout: 120s

  - action: wait-boot
    timeout: 2m0s
    params:
      retry_interval: 5s

  # After first reboot: driver is loaded as boot-start, LowerFilters was applied.
  # Rescan devices so PnP re-enumerates and calls AddDevice for existing volumes.
  - action: exec
    timeout: 60s
    params:
      cmd: "powershell"
      args:
        - "-Command"
        - |
          # Force PnP re-enumeration so AddDevice fires for existing volumes
          # (PnP only auto-calls AddDevice for NEW devices; existing devices need rescan).
          pnputil /scan-devices
          Write-Host "PnP rescan complete"
      expect_exit_code: 0

  # Second reboot: LowerFilters changes took effect from FIRST reboot,
  # so NOW AddDevice fires and places filter BELOW NTFS for D:.
  # (LowerFilters persists across reboots; the FIRST boot had it registered
  #  but PnP already enumerated before the key was written for some devices)
  - action: reboot
    timeout: 120s

  - action: wait-boot
    timeout: 2m0s
    params:
      retry_interval: 5s

  # After reboot: AddDevice has fired. D: filter is below NTFS.
  # Check if vck-app is accessible.
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe status --volume \\\\.\\D:"
      expect_exit_code: 0

  # Volume-info before attach.
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe volume-info --volume \\\\.\\D:"
      expect_exit_code: 0

  # Phase: shrink + PREPARE + attach (AddDevice path — no lock/dismount).
  # filter_below_fsd should be true in status now.
  - action: exec
    timeout: 2m0s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe data-volume attach --volume \\\\.\\D: --vmk AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8= --use-header 0 --use-footer 2 --metadata-size 131072"
      expect_exit_code: 0

  # Volume-info after attach: should show reduced size (metadata region hidden).
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe volume-info --volume \\\\.\\D:"
      expect_exit_code: 0

  # Pre-existing file must be readable through filter.
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "type D:\\vck-pretest.txt"
      expect_exit_code: 0

  # Write new file through filter.
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "echo hello-after-attach> D:\\vck-posttest.txt && type D:\\vck-posttest.txt"
      expect_exit_code: 0

  # Status should show filter_below_fsd: true.
  - action: exec
    timeout: 30s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe status --volume \\\\.\\D:"
      expect_exit_code: 0

  # Detach and stop driver.
  - action: exec
    timeout: 60s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "C:\\Temp\\vck-app.exe data-volume detach --volume \\\\.\\D:"
      expect_exit_code: 0

  - action: exec
    timeout: 60s
    params:
      cmd: "cmd.exe"
      args:
        - "/c"
        - "sc stop VolumeCryptKitSample"

  - action: shutdown
    timeout: 2m0s

panic:
  action_delay: 60s
  steps:
    - action: dump
      timeout: 300s
      params:
        format: "win-dmp"
        output: "${{ output.dir}}/memory.dmp"
    - action: poweroff
      timeout: 5s
